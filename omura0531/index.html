<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生徒作品まとめ</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0a192f,#112240);
    color:white;
    text-align:center;
    padding:30px;
}

h1{
    font-size:2.5em;
    color:#64ffda;
    margin-bottom:10px;
}

p{
    color:#ccd6f6;
    margin-bottom:30px;
}

.container{
    max-width:800px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
}

.card{
    background:rgba(255,255,255,0.08);
    border:2px solid #64ffda;
    border-radius:18px;
    padding:20px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 20px rgba(100,255,218,0.4);
}

a{
    color:white;
    text-decoration:none;
    display:block;
}

.name{
    font-size:1.4em;
    font-weight:bold;
    margin-bottom:10px;
    color:#64ffda;
}

.url{
    font-size:0.85em;
    word-break:break-all;
    color:#ccd6f6;
}
</style>
</head>
<body>

<h1>🎮 生徒作品まとめサイト</h1>
<p>名前をタップして作品を見よう！</p>

<div class="container">

<div class="card"><a href="https://steamkanazawa.github.io/2026-May/syota-game/" target="_blank"><div class="name">しょうた</div></a></div>
