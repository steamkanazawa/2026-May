<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>空中バトル弾幕ゲーム</title>
<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
}
canvas{
  background:linear-gradient(#123,#000);
  border:4px solid white;
  margin-top:15px;
}
button{
  font-size:20px;
  padding:10px 25px;
  margin-top:10px;
}
</style>
</head>
<body>

<h1>空中バトル弾幕ゲーム</h1>
<p>WASD/矢印キーで移動　Jで攻撃　Kでジャストガード</p>

<canvas id="game" width="800" height="450"></canvas>
<br>
<button onclick="startGame()">スタート</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let keys = {};
let player;
let enemy;

let playerBullets = [];
let enemyBullets = [];

let playing = false;
let gameOver = false;
let clear = false;

let enemyTimer = 0;
let attackCooldown = 0;

let guardTimer = 0;
let guardCooldown = 0;
const justGuardTime = 12;

document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

function startGame(){
  player = {
    x:120,
    y:260,
    w:28,
    h:28,
    speed:5,
    hp:100,
    maxHp:100
  };

  enemy = {
    x:620,
    y:180,
    w:50,
    h:50,
    hp:300,
    maxHp:300,
    t:0
  };

  playerBullets = [];
  enemyBullets = [];

  enemyTimer = 0;
  attackCooldown = 0;
  guardTimer = 0;
  guardCooldown = 0;

  playing = true;
  gameOver = false;
  clear = false;

  loop();
}

function update(){
  if(!playing) return;

  if(keys["a"] || keys["arrowleft"]) player.x -= player.speed;
  if(keys["d"] || keys["arrowright"]) player.x += player.speed;
  if(keys["w"] || keys["arrowup"]) player.y -= player.speed;
  if(keys["s"] || keys["arrowdown"]) player.y += player.speed;

  if(player.x < 0) player.x = 0;
  if(player.x + player.w > canvas.width) player.x = canvas.width - player.w;
  if(player.y < 0) player.y = 0;
  if(player.y + player.h > canvas.height) player.y = canvas.height - player.h;

  if(keys["j"] && attackCooldown <= 0){
    shootPlayer();
    attackCooldown = 12;
  }

  if(attackCooldown > 0) attackCooldown--;

  if(keys["k"] && guardCooldown <= 0){
    guardTimer = justGuardTime;
    guardCooldown = 45;
  }

  if(guardTimer > 0) guardTimer--;
  if(guardCooldown > 0) guardCooldown--;

  enemy.t++;
  enemy.y = 180 + Math.sin(enemy.t * 0.04) * 80;

  enemyTimer++;
  if(enemyTimer > 35){
    enemyAttack();
    enemyTimer = 0;
  }

  for(let i=playerBullets.length-1; i>=0; i--){
    const b = playerBullets[i];
    b.x += b.vx;
    b.y += b.vy;

    if(rectCircleHit(enemy, b)){
      enemy.hp -= 10;
      playerBullets.splice(i,1);

      if(enemy.hp <= 0){
        enemy.hp = 0;
        playing = false;
        clear = true;
      }
      continue;
    }

    if(b.x > canvas.width + 50){
      playerBullets.splice(i,1);
    }
  }

  for(let i=enemyBullets.length-1; i>=0; i--){
    const b = enemyBullets[i];
    b.x += b.vx;
    b.y += b.vy;

    if(rectCircleHit(player, b)){
      if(guardTimer > 0){
        enemyBullets.splice(i,1);
        enemy.hp -= 5;

        if(enemy.hp <= 0){
          enemy.hp = 0;
          playing = false;
          clear = true;
        }
        continue;
      }

      player.hp -= 8;
      enemyBullets.splice(i,1);

      if(player.hp <= 0){
        player.hp = 0;
        playing = false;
        gameOver = true;
      }
      continue;
    }

    if(
      b.x < -100 ||
      b.x > canvas.width + 100 ||
      b.y < -100 ||
      b.y > canvas.height + 100
    ){
      enemyBullets.splice(i,1);
    }
  }
}

function shootPlayer(){
  playerBullets.push({
    x:player.x + player.w,
    y:player.y + player.h / 2,
    r:7,
    vx:9,
    vy:0
  });
}

function enemyAttack(){
  const pattern = Math.floor(Math.random() * 7);

  if(pattern === 0){
    for(let i=-3; i<=3; i++){
      enemyBullets.push({
        x:enemy.x,
        y:enemy.y + enemy.h / 2,
        r:12,
        vx:-3,
        vy:i * 1.1
      });
    }
  }

  if(pattern === 1){
    for(let i=0; i<12; i++){
      const angle = Math.PI + i * 0.18 - 1.0;
      enemyBullets.push({
        x:enemy.x,
        y:enemy.y + enemy.h / 2,
        r:10,
        vx:Math.cos(angle) * 3,
        vy:Math.sin(angle) * 3
      });
    }
  }

  if(pattern === 2){
    const dx = player.x - enemy.x;
    const dy = player.y - enemy.y;
    const angle = Math.atan2(dy, dx);

    for(let i=0; i<5; i++){
      enemyBullets.push({
        x:enemy.x,
        y:enemy.y + enemy.h / 2,
        r:14,
        vx:Math.cos(angle) * (2 + i * 0.45),
        vy:Math.sin(angle) * (2 + i * 0.45)
      });
    }
  }

  if(pattern === 3){
    for(let i=0; i<18; i++){
      const angle = i * Math.PI * 2 / 18;
      enemyBullets.push({
        x:enemy.x + enemy.w / 2,
        y:enemy.y + enemy.h / 2,
        r:9,
        vx:Math.cos(angle) * 2.4,
        vy:Math.sin(angle) * 2.4
      });
    }
  }

  if(pattern === 4){
    for(let i=0; i<12; i++){
      enemyBullets.push({
        x:Math.random() * canvas.width,
        y:-20,
        r:11,
        vx:0,
        vy:2.6 + Math.random()
      });
    }
  }

  if(pattern === 5){
    for(let i=0; i<6; i++){
      enemyBullets.push({
        x:enemy.x,
        y:enemy.y + i * 12,
        r:12,
        vx:-2.6,
        vy:Math.sin(i) * 2
      });
    }
  }

  if(pattern === 6){
    const dx = player.x - enemy.x;
    const dy = player.y - enemy.y;
    const angle = Math.atan2(dy, dx);

    enemyBullets.push({
      x:enemy.x,
      y:enemy.y + enemy.h / 2,
      r:25,
      vx:Math.cos(angle) * 3.2,
      vy:Math.sin(angle) * 3.2
    });
  }
}

function rectCircleHit(rect, c){
  const cx = Math.max(rect.x, Math.min(c.x, rect.x + rect.w));
  const cy = Math.max(rect.y, Math.min(c.y, rect.y + rect.h));
  const dx = c.x - cx;
  const dy = c.y - cy;
  return dx * dx + dy * dy < c.r * c.r;
}

function drawBar(x,y,w,h,value,max,color){
  ctx.fillStyle = "#555";
  ctx.fillRect(x,y,w,h);

  ctx.fillStyle = color;
  ctx.fillRect(x,y,w * (value / max),h);

  ctx.strokeStyle = "white";
  ctx.strokeRect(x,y,w,h);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "rgba(255,255,255,0.08)";
  for(let i=0; i<20; i++){
    ctx.beginPath();
    ctx.arc((i*80)%800, (i*47)%450, 2, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.fillStyle = "lime";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  if(guardTimer > 0){
    ctx.strokeStyle = "yellow";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(
      player.x + player.w / 2,
      player.y + player.h / 2,
      32,
      0,
      Math.PI * 2
    );
    ctx.stroke();
  }

  if(guardCooldown > 0){
    ctx.fillStyle = "white";
    ctx.font = "14px sans-serif";
    ctx.fillText("GUARD WAIT", player.x - 20, player.y - 10);
  }

  ctx.fillStyle = "red";
  ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);

  ctx.fillStyle = "yellow";
  for(const b of playerBullets){
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fill();
  }

  ctx.fillStyle = "cyan";
  for(const b of enemyBullets){
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fill();
  }

  drawBar(20,20,220,18,player.hp,player.maxHp,"lime");
  drawBar(560,20,220,18,enemy.hp,enemy.maxHp,"red");

  ctx.fillStyle = "white";
  ctx.font = "18px sans-serif";
  ctx.fillText("PLAYER",20,60);
  ctx.fillText("ENEMY",560,60);
  ctx.fillText("J:攻撃",20,90);
  ctx.fillText("K:ジャストガード",20,115);

  if(gameOver){
    ctx.fillStyle = "rgba(0,0,0,.75)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "44px sans-serif";
    ctx.fillText("GAME OVER",270,220);
  }

  if(clear){
    ctx.fillStyle = "rgba(0,0,0,.75)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "yellow";
    ctx.font = "44px sans-serif";
    ctx.fillText("CLEAR!",330,220);
  }
}

function loop(){
  update();
  draw();

  if(playing){
    requestAnimationFrame(loop);
  }else{
    draw();
  }
}

player = {
  x:120,
  y:260,
  w:28,
  h:28,
  speed:5,
  hp:100,
  maxHp:100
};

enemy = {
  x:620,
  y:180,
  w:50,
  h:50,
  hp:300,
  maxHp:300,
  t:0
};

draw();
</script>

</body>
</html>
