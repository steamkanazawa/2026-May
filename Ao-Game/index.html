<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>CUTE SLIME DESERT</title>
<style>
html,body{margin:0;overflow:hidden;background:#1b1208;touch-action:none;font-family:monospace}
canvas{display:block;image-rendering:pixelated}
#ui{position:fixed;left:10px;top:10px;color:white;font-size:18px;font-weight:bold;text-shadow:3px 3px #000}
#menu{position:fixed;inset:0;background:rgba(0,0,0,.65);color:white;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center}
button{font-size:22px;padding:12px 30px;border:0;background:#ffd43b;font-weight:bold}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
 SCORE <span id="score">0</span><br>
 HIGH <span id="high">0</span><br>
 LIFE <span id="hp">1</span>
</div>

<div id="menu">
  <h1>CUTE SLIME DESERT</h1>
  <p>巨大な紫スライムに注意！<br>障害物を無視してゆっくり近づきます</p>
  <p>PC：WASD / 矢印キー<br>スマホ：ドラッグ移動</p>
  <button onclick="startGame()">START</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const scoreEl=document.getElementById("score");
const highEl=document.getElementById("high");
const hpEl=document.getElementById("hp");
const menu=document.getElementById("menu");

let W,H,isMobile;
let player,enemies,coins,rocks,cactus,particles,sand;
let score=0,hp=1,frame=0,running=false;
let high=localStorage.cuteSlimePurpleHigh||0;
highEl.textContent=high;

let keys={},touch=false,tx=0,ty=0;

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
  isMobile=W<700;
  ctx.imageSmoothingEnabled=false;
}
addEventListener("resize",resize);
resize();

/* キー操作修正版 */
addEventListener("keydown",e=>{
  keys[e.code]=true;
  keys[e.key]=true;
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.code)){
    e.preventDefault();
  }
});

addEventListener("keyup",e=>{
  keys[e.code]=false;
  keys[e.key]=false;
});

canvas.addEventListener("pointerdown",e=>{touch=true;tx=e.clientX;ty=e.clientY});
canvas.addEventListener("pointermove",e=>{if(touch){tx=e.clientX;ty=e.clientY}});
canvas.addEventListener("pointerup",()=>touch=false);

function rand(a,b){return a+Math.random()*(b-a)}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function R(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.floor(x),Math.floor(y),Math.floor(w),Math.floor(h))}
function inside(o){return o.x>o.r&&o.x<W-o.r&&o.y>o.r&&o.y<H-o.r}

function startGame(){
  player={x:W/2,y:H/2,r:isMobile?16:14,speed:isMobile?5.2:4.3};

  enemies=[];coins=[];rocks=[];cactus=[];particles=[];sand=[];
  score=0;hp=1;frame=0;
  scoreEl.textContent=0;
  hpEl.textContent=1;

  for(let i=0;i<12;i++)spawnCoin();
  for(let i=0;i<(isMobile?16:24);i++)spawnRock();
  for(let i=0;i<(isMobile?7:12);i++)spawnCactus();
  for(let i=0;i<(isMobile?8:12);i++)spawnEnemy();

  spawnPurple();

  for(let i=0;i<100;i++)spawnSand(true);

  menu.style.display="none";
  running=true;
  loop();
}

function gameOver(){
  running=false;
  if(score>high){high=score;localStorage.cuteSlimePurpleHigh=high}
  highEl.textContent=high;
  menu.style.display="flex";
  menu.querySelector("h1").textContent="GAME OVER";
  menu.querySelector("p").innerHTML="SCORE "+score+"<br>HIGH "+high+"<br><br>もう一回！";
  menu.querySelector("button").textContent="RETRY";
}

function safePoint(){
  for(let i=0;i<100;i++){
    let p={x:rand(35,W-35),y:rand(55,H-35)};
    if(Math.hypot(p.x-player.x,p.y-player.y)>120)return p;
  }
  return{x:W/2,y:H/2};
}

function safePurplePoint(r){
  for(let i=0;i<200;i++){
    let p={x:rand(r+20,W-r-20),y:rand(r+40,H-r-20)};
    if(Math.hypot(p.x-player.x,p.y-player.y)>r+player.r+140)return p;
  }
  return{x:r+30,y:r+60};
}

function spawnCoin(){let p=safePoint();coins.push({x:p.x,y:p.y,r:8})}
function spawnRock(){let p=safePoint();rocks.push({x:p.x,y:p.y,w:rand(32,65),h:rand(24,48)})}
function spawnCactus(){let p=safePoint();cactus.push({x:p.x,y:p.y,r:14,hit:0})}

function edgePoint(r){
  let side=Math.floor(Math.random()*4);
  if(side===0)return{x:rand(r+10,W-r-10),y:r+10};
  if(side===1)return{x:rand(r+10,W-r-10),y:H-r-10};
  if(side===2)return{x:r+10,y:rand(r+40,H-r-10)};
  return{x:W-r-10,y:rand(r+40,H-r-10)};
}

function spawnPurple(){
  let r=Math.sqrt((W*H/16)/Math.PI);
  r=Math.max(45,Math.min(r,Math.min(W,H)*0.23));

  let p=safePurplePoint(r);
  enemies.push({
    type:"purple",
    x:p.x,
    y:p.y,
    r:r,
    hp:9999,
    speed:isMobile?0.42:0.55,
    color:"#9b5cff"
  });
}

function spawnEnemy(){
  let t=Math.random();
  let type,r,hp,speed,color;

  if(t<0.38){
    type="normal"; r=18; hp=3; speed=isMobile?1.25:1.75; color="#58d85f";
  }else if(t<0.66){
    type="dash"; r=18; hp=3; speed=isMobile?0.9:1.25; color="#ff6666";
  }else if(t<0.88){
    type="fast"; r=15; hp=2; speed=isMobile?2.0:2.85; color="#37c7ff";
  }else{
    type="yellow"; r=17; hp=1; speed=isMobile?3.1:4.2; color="#ffd43b";
  }

  let p=edgePoint(r);
  let enemy={type,x:p.x,y:p.y,r,hp,speed,color};

  if(type==="dash"){
    enemy.wait=70;
    enemy.dashTime=0;
    enemy.vx=0;
    enemy.vy=0;
  }

  if(type==="yellow"){
    let dx=player.x-p.x;
    let dy=player.y-p.y;
    let d=Math.hypot(dx,dy)||1;
    enemy.vx=dx/d*speed;
    enemy.vy=dy/d*speed;
    enemy.warn=35;
  }

  enemies.push(enemy);
}

function spawnSand(first=false){
  sand.push({
    x:first?rand(0,W):rand(-100,-10),
    y:rand(0,H),
    vx:rand(3,9),
    vy:rand(-.3,.7),
    w:rand(12,38),
    h:rand(2,4),
    a:rand(.11,.28)
  });
}

function hitRock(o){
  for(let r of rocks){
    let cx=Math.max(r.x-r.w/2,Math.min(o.x,r.x+r.w/2));
    let cy=Math.max(r.y-r.h/2,Math.min(o.y,r.y+r.h/2));
    if(Math.hypot(o.x-cx,o.y-cy)<o.r)return true;
  }
  return false;
}

function hitCactus(o){
  for(let c of cactus){
    if(dist(o,c)<o.r+c.r)return c;
  }
  return null;
}

function burst(x,y,c){
  for(let i=0;i<14;i++){
    particles.push({x,y,vx:rand(-4,4),vy:rand(-4,4),life:24,color:c});
  }
}

function damage(){
  hp=0;
  hpEl.textContent=0;
  burst(player.x,player.y,"#fff");
  gameOver();
}

function moveObj(o,dx,dy,isEnemy=false){
  o.x+=dx;
  if(!inside(o)||hitRock(o))o.x-=dx;

  o.y+=dy;
  if(!inside(o)||hitRock(o))o.y-=dy;

  let ca=hitCactus(o);
  if(ca){
    o.x-=dx;
    o.y-=dy;
    ca.hit=8;
    if(isEnemy)o.hp-=o.type==="dash"?2:1;
    else damage();
  }
}

function update(){
  frame++;

  let dx=0,dy=0;

  /* 入力判定も修正 */
  if(keys.ArrowUp||keys.KeyW||keys.w||keys.W)dy--;
  if(keys.ArrowDown||keys.KeyS||keys.s||keys.S)dy++;
  if(keys.ArrowLeft||keys.KeyA||keys.a||keys.A)dx--;
  if(keys.ArrowRight||keys.KeyD||keys.d||keys.D)dx++;

  if(touch){
    dx=tx-player.x;
    dy=ty-player.y;
    let d=Math.hypot(dx,dy);
    if(d>8){dx/=d;dy/=d}else{dx=0;dy=0}
  }

  if(dx||dy){
    let d=Math.hypot(dx,dy);
    moveObj(player,dx/d*player.speed,dy/d*player.speed,false);
  }

  for(let e of enemies){
    let dx=player.x-e.x;
    let dy=player.y-e.y;
    let d=Math.hypot(dx,dy)||1;

    if(e.type==="purple"){
      e.x+=dx/d*e.speed;
      e.y+=dy/d*e.speed;
    }else if(e.type==="yellow"){
      if(e.warn>0){
        e.warn--;
      }else{
        e.x+=e.vx;
        e.y+=e.vy;
      }
    }else if(e.type==="dash"){
      e.wait--;
      if(e.wait<=0&&e.dashTime<=0){
        e.vx=dx/d*(isMobile?5.4:6.8);
        e.vy=dy/d*(isMobile?5.4:6.8);
        e.dashTime=25;
        e.wait=110;
      }
      if(e.dashTime>0){
        moveObj(e,e.vx,e.vy,true);
        e.dashTime--;
      }else{
        moveObj(e,dx/d*e.speed,dy/d*e.speed,true);
      }
    }else{
      moveObj(e,dx/d*e.speed,dy/d*e.speed,true);
    }

    if(dist(player,e)<player.r+e.r*0.82)damage();
  }

  for(let i=enemies.length-1;i>=0;i--){
    let e=enemies[i];

    if(e.type==="yellow"&&(e.x<-80||e.x>W+80||e.y<-80||e.y>H+80)){
      enemies.splice(i,1);
      continue;
    }

    if(e.hp<=0){
      burst(e.x,e.y,"#ffe066");
      score+=20;
      scoreEl.textContent=score;
      enemies.splice(i,1);
    }
  }

  for(let i=coins.length-1;i>=0;i--){
    if(dist(player,coins[i])<player.r+coins[i].r){
      score+=10;
      scoreEl.textContent=score;
      burst(coins[i].x,coins[i].y,"#ffd43b");
      coins.splice(i,1);
      spawnCoin();
    }
  }

  if(frame%(isMobile?140:95)===0)spawnEnemy();

  for(let c of cactus)if(c.hit>0)c.hit--;

  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }

  for(let i=sand.length-1;i>=0;i--){
    let s=sand[i];
    s.x+=s.vx;s.y+=s.vy;
    if(s.x>W+100||s.y<-20||s.y>H+20){
      sand.splice(i,1);
      spawnSand(false);
    }
  }
}

function drawBg(){
  R(0,0,W,H,"#9a6334");
  let tile=24;
  for(let y=0;y<H;y+=tile){
    for(let x=0;x<W;x+=tile){
      let n=(x*13+y*7+frame)%97;
      R(x,y,tile,tile,n<48?"#d49a50":"#c88943");
      if(n%11===0)R(x+7,y+9,5,3,"#9a612e");
      if(n%17===0)R(x+15,y+16,6,3,"#e2ad68");
    }
  }
  R(0,0,W,8,"#6b3f20");
  R(0,H-8,W,8,"#6b3f20");
  R(0,0,8,H,"#6b3f20");
  R(W-8,0,8,H,"#6b3f20");
}

function drawCoin(c){
  R(c.x-8,c.y-8,16,16,"#c98200");
  R(c.x-5,c.y-5,10,10,"#ffd43b");
  R(c.x-2,c.y-2,4,4,"#fff3bf");
}

function drawRock(r){
  R(r.x-r.w/2,r.y-r.h/2,r.w,r.h,"#5d5043");
  R(r.x-r.w/2+5,r.y-r.h/2+5,r.w-10,6,"#84715c");
  R(r.x-r.w/2,r.y+r.h/2-5,r.w,5,"#332b24");
}

function drawCactus(c){
  let x=c.x,y=c.y,col=c.hit>0?"#7dff7a":"#2d9b45";
  R(x-6,y-21,12,38,col);
  R(x-12,y-7,9,17,col);
  R(x+5,y-3,11,8,col);
  R(x+7,y-14,8,21,col);
  R(x-4,y-27,8,6,"#ff6b9a");
  R(x-10,y+15,24,5,"#8a5a2b");
}

function slime(x,y,r,c,type="normal",isPlayer=false){
  R(x-r*.9,y+r*.42,r*1.8,Math.max(5,r*.16),"rgba(0,0,0,.25)");

  R(x-r*.85,y-r*.35,r*1.7,r*.95,c);
  R(x-r*.70,y-r*.62,r*1.4,r*.35,c);
  R(x-r*.48,y-r*.86,r*.96,r*.27,c);
  R(x-r*.25,y-r*1.03,r*.50,r*.18,c);

  R(x-r*.78,y+r*.43,r*1.56,Math.max(3,r*.06),"rgba(0,0,0,.32)");
  R(x-r*.85,y-r*.18,Math.max(3,r*.08),r*.55,"rgba(0,0,0,.22)");
  R(x+r*.85-Math.max(3,r*.08),y-r*.18,Math.max(3,r*.08),r*.55,"rgba(0,0,0,.22)");

  R(x-r*.55,y-r*.50,r*.40,r*.22,"rgba(255,255,255,.48)");
  R(x-r*.26,y-r*.70,r*.34,r*.16,"rgba(255,255,255,.34)");
  R(x-r*.68,y-r*.12,r*.22,r*.14,"rgba(255,255,255,.22)");

  R(x-r*.42,y-r*.10,Math.max(5,r*.14),Math.max(8,r*.22),"#fff");
  R(x+r*.22,y-r*.10,Math.max(5,r*.14),Math.max(8,r*.22),"#fff");
  R(x-r*.35,y-r*.02,Math.max(2,r*.055),Math.max(2,r*.055),"#222");
  R(x+r*.29,y-r*.02,Math.max(2,r*.055),Math.max(2,r*.055),"#222");

  if(type==="yellow"){
    R(x-r*.2,y+r*.20,r*.4,Math.max(3,r*.06),"#8a5a00");
  }else{
    R(x-r*.14,y+r*.23,r*.28,Math.max(2,r*.045),"#7a3a3a");
  }

  if(isPlayer){
    R(x-r*.65,y-r-8,r*1.3,3,"#f0ffff");
  }

  if(type==="dash"){
    R(x-r-22,y-5,17,4,"#ffe0e0");
    R(x-r-16,y+2,12,3,"#fff");
    R(x-r-9,y+9,7,3,"#ffd0d0");
  }

  if(type==="yellow"){
    R(x-r-18,y-4,12,4,"#fff3bf");
    R(x-r-11,y+4,8,3,"#ffe066");
  }

  if(type==="purple"){
    R(x-r*.35,y-r*1.12,r*.7,r*.12,"#d8c2ff");
    R(x-r*.55,y-r*.75,r*.25,r*.12,"rgba(255,255,255,.38)");
  }
}

function drawYellowWarn(e){
  if(e.type!=="yellow"||e.warn<=0)return;
  ctx.strokeStyle="rgba(255,255,120,.8)";
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(e.x,e.y);
  ctx.lineTo(e.x+e.vx*80,e.y+e.vy*80);
  ctx.stroke();
}

function drawSand(){
  for(let s of sand){
    ctx.fillStyle=`rgba(255,230,160,${s.a})`;
    ctx.fillRect(Math.floor(s.x),Math.floor(s.y),Math.floor(s.w),Math.floor(s.h));
  }
  ctx.fillStyle="rgba(214,157,78,.09)";
  ctx.fillRect(0,0,W,H);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawBg();

  for(let r of rocks)drawRock(r);
  for(let c of cactus)drawCactus(c);
  for(let c of coins)drawCoin(c);

  for(let e of enemies)drawYellowWarn(e);

  for(let e of enemies)if(e.type==="purple")slime(e.x,e.y,e.r,e.color,e.type,false);
  for(let e of enemies)if(e.type!=="purple")slime(e.x,e.y,e.r,e.color,e.type,false);

  for(let p of particles)R(p.x,p.y,5,5,p.color);

  slime(player.x,player.y,player.r,"#c9f8ff","normal",true);

  drawSand();
}

function loop(){
  if(!running)return;
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
