<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>弾よけゲーム</title>
<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
}
canvas{
  background:#000;
  border:4px solid white;
  margin-top:20px;
}
button{
  font-size:20px;
  padding:10px 25px;
  margin-top:15px;
}
</style>
</head>
<body>

<h1>弾よけゲーム</h1>
<p>WASD / 矢印キーでハートを動かして弾をよけろ！</p>
<canvas id="game" width="600" height="400"></canvas>
<br>
<button onclick="startGame()">スタート</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player;
let bullets;
let keys = {};
let hp;
let score;
let gameOver;
let playing;
let spawnTimer;

const box = {
  x: 80,
  y: 70,
  w: 440,
  h: 260
};

document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

function startGame(){
  player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    size: 14,
    speed: 4
  };

  bullets = [];
  hp = 100;
  score = 0;
  gameOver = false;
  playing = true;
  spawnTimer = 0;

  requestAnimationFrame(loop);
}

function spawnBullet(){
  const side = Math.floor(Math.random() * 4);
  let x, y;

  if(side === 0){
    x = Math.random() * canvas.width;
    y = -20;
  }else if(side === 1){
    x = canvas.width + 20;
    y = Math.random() * canvas.height;
  }else if(side === 2){
    x = Math.random() * canvas.width;
    y = canvas.height + 20;
  }else{
    x = -20;
    y = Math.random() * canvas.height;
  }

  const angle = Math.atan2(player.y - y, player.x - x);
  const speed = 2 + Math.random() * 2 + score * 0.002;

  bullets.push({
    x:x,
    y:y,
    r:7,
    vx:Math.cos(angle) * speed,
    vy:Math.sin(angle) * speed
  });
}

function update(){
  if(!playing) return;

  if(keys["w"] || keys["arrowup"]) player.y -= player.speed;
  if(keys["s"] || keys["arrowdown"]) player.y += player.speed;
  if(keys["a"] || keys["arrowleft"]) player.x -= player.speed;
  if(keys["d"] || keys["arrowright"]) player.x += player.speed;

  if(player.x < box.x) player.x = box.x;
  if(player.x > box.x + box.w) player.x = box.x + box.w;
  if(player.y < box.y) player.y = box.y;
  if(player.y > box.y + box.h) player.y = box.y + box.h;

  spawnTimer++;
  if(spawnTimer > Math.max(8, 35 - score / 80)){
    spawnBullet();
    spawnTimer = 0;
  }

  for(let i = bullets.length - 1; i >= 0; i--){
    const b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;

    const dx = player.x - b.x;
    const dy = player.y - b.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if(dist < player.size + b.r){
      hp -= 10;
      bullets.splice(i, 1);

      if(hp <= 0){
        hp = 0;
        gameOver = true;
        playing = false;
      }
      continue;
    }

    if(b.x < -50 || b.x > canvas.width + 50 || b.y < -50 || b.y > canvas.height + 50){
      bullets.splice(i, 1);
    }
  }

  score++;
}

function drawHeart(x, y, size){
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.moveTo(x, y + size / 3);
  ctx.bezierCurveTo(x - size, y - size / 2, x - size * 1.4, y + size / 2, x, y + size);
  ctx.bezierCurveTo(x + size * 1.4, y + size / 2, x + size, y - size / 2, x, y + size / 3);
  ctx.fill();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle = "white";
  ctx.lineWidth = 4;
  ctx.strokeRect(box.x, box.y, box.w, box.h);

  drawHeart(player.x, player.y, player.size);

  ctx.fillStyle = "cyan";
  for(const b of bullets){
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = "white";
  ctx.font = "22px sans-serif";
  ctx.fillText("HP: " + hp, 20, 35);
  ctx.fillText("SCORE: " + Math.floor(score / 10), 430, 35);

  if(!playing && gameOver){
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "40px sans-serif";
    ctx.fillText("GAME OVER", 180, 190);

    ctx.font = "22px sans-serif";
    ctx.fillText("スコア: " + Math.floor(score / 10), 245, 230);
    ctx.fillText("スタートボタンで再挑戦", 190, 270);
  }
}

function loop(){
  update();
  draw();
  if(playing){
    requestAnimationFrame(loop);
  }
}

draw();
</script>

</body>
</html>
