<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生徒作品まとめ</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0a192f,#112240);
    color:white;
    text-align:center;
    padding:30px;
}

h1{
    font-size:2.5em;
    color:#64ffda;
}

.container{
    max-width:900px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
}

.card{
    background:rgba(255,255,255,0.08);
    border:2px solid #64ffda;
    border-radius:18px;
    padding:20px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 20px rgba(100,255,218,.4);
}

a{
    color:white;
    text-decoration:none;
}

.name{
    font-size:1.4em;
    color:#64ffda;
    font-weight:bold;
}

.work{
    margin-top:10px;
    color:#ccd6f6;
    font-size:.95em;
}
</style>
</head>
<body>

<h1>🎮 生徒作品まとめサイト</h1>
<p>名前をクリックして作品を見よう！</p>

<div class="container" id="container"></div>

<script>
const works = [
["あお","https://steamkanazawa.github.io/2026-May/Ao-Game/"],
    ["あさひ","https://steamkanazawa.github.io/2026-May/asahi0531/"],
["ありさ","https://steamkanazawa.github.io/2026-May/pikuminge-mu/"],
["いつき","https://steamkanazawa.github.io/2026-May/DONNOTMISSSHOT/"],
["おむら1","https://steamkanazawa.github.io/2026-May/omura0531/"],
 ["おむら2","https://steamkanazawa.github.io/2026-May/omura0531-2/"],   
["こうた","https://steamkanazawa.github.io/2026-May/kota0531/"],
["きょうじ","https://steamkanazawa.github.io/2026-May/kyoji0531/"],
["しょうた","https://steamkanazawa.github.io/2026-May/syota-game/"],
["しゅんた","https://steamkanazawa.github.io/2026-May/tanabe0531/"],
        ["たいすけ","https://steamkanazawa.github.io/2026-May/taisue0531/"],
["たける","https://steamkanazawa.github.io/2026-May/takeru-Chess/"],
["たくま","https://steamkanazawa.github.io/2026-May/ohashi-game/"],
["のと","https://steamkanazawa.github.io/2026-May/notoai/"],
["ひろゆき","https://steamkanazawa.github.io/2026-May/teramoto0531/"],
["ゆき","https://steamkanazawa.github.io/2026-May/shimada-game/"],
["りゅうせい","https://steamkanazawa.github.io/2026-May/rsyougi/"],


];

const container = document.getElementById("container");

works.forEach(([name,url])=>{
    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
        <a href="${url}" target="_blank">
            <div class="name">${name}</div>
            <div class="work" id="${name}">作品名を取得中...</div>
        </a>
    `;

    container.appendChild(card);

    fetch(url)
        .then(r=>r.text())
        .then(html=>{
            const titleMatch = html.match(/<title>(.*?)<\/title>/i);
            document.getElementById(name).textContent =
                titleMatch ? titleMatch[1] : "作品を見る";
        })
        .catch(()=>{
            document.getElementById(name).textContent = "作品を見る";
        });
});
</script>

</body>
</html>
