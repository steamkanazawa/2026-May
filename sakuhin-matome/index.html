<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生徒作品まとめ</title>

<style>
body{
    margin:0;
    font-family:"Arial",sans-serif;
    background:linear-gradient(135deg,#dff6ff,#b8e8fc);
    color:#333;
    text-align:center;
    padding:30px;
}

h1{
    font-size:2.5em;
    color:#0077b6;
    margin-bottom:10px;
}

p{
    font-size:1.1em;
    color:#555;
    margin-bottom:30px;
}

.container{
    max-width:900px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
}

.card{
    background:white;
    border-radius:20px;
    padding:22px;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
    transition:0.25s;
    border:3px solid #90e0ef;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 10px 24px rgba(0,0,0,0.18);
    border-color:#00b4d8;
}

a{
    text-decoration:none;
    color:inherit;
    display:block;
}

.name{
    font-size:1.5em;
    font-weight:bold;
    color:#0077b6;
    margin-bottom:10px;
}

.url{
    font-size:0.85em;
    color:#666;
    word-break:break-all;
}

.icon{
    font-size:2em;
    margin-bottom:10px;
}
</style>
</head>
<body>

<h1>🎮 生徒作品ギャラリー</h1>
<p>名前をクリックして、みんなの作品を見てみよう！</p>

<div class="container">

<div class="card"><a href="https://steamkanazawa.github.io/2026-May/Ao-Game/" target="_blank"><div class="icon">🌟</div><div class="name">あお</div></a></div>

<div class="card"><a href="https://steamkanazawa.github.io/2026-May/DONNOTMISSSHOT/" target="_blank"><div class="icon">🚀</div><div class="name">いつき</div></a></div>

<div class="card"><a href="https://steamkanazawa.github.io/2026-May/kota0531/" target="_blank"><div class="icon">⚡</div><div class="name">こうた</div></a></div>

<div class="card"><a href="https://steamkanazawa.github.io/2026-May/kyoji0531/" target="_blank"><div class="icon">🔥</div><div class="name">きょうじ</div></a></div>

<div class="card"><a href="https://steamkanazawa.github.io/2026-May/syota-game/" target="_blank"><div class="icon">🎯</div><div class="name">しょうた</div></a></div>

<div class="card"><a href="https://steamkanazawa.github.io/2026-May/takeru-Chess/" target="_blank"><div class="icon">♟️</div><div class="name">たける</div></a></div>

<div class="card"><a href="https://steamkanazawa.github.io/2026-May/ohashi-game/" target="_blank"><div class="icon">🌈</div><div class="name">たくま</div></a></div>

<div class="card"><a href="https://steamkanazawa.github.io/2026-May/tanabe0531/" target="_blank"><div class="icon">🛸</div><div class="name">しゅんた</div></a></div>
