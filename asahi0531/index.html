<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cute Defense Game - Power Up</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #fdf0f0; color: #5d4037; font-family: 'M PLUS Rounded 1c', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #ffffff; border: 8px solid #ffccd5; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); cursor: crosshair; }
        .stats-container { display: flex; gap: 20px; margin: 10px; font-size: 20px; background: white; padding: 10px 30px; border-radius: 50px; border: 3px solid #ffccd5; }
        .shop { display: flex; gap: 10px; margin-top: 15px; background: #ffebee; padding: 15px; border-radius: 20px; }
        button { font-family: 'M PLUS Rounded 1c', sans-serif; background: #ff8fa3; color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 14px; }
        button:hover { background: #ff4d6d; transform: scale(1.05); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .price { display: block; font-size: 12px; color: #fff3f3; }
    </style>
</head>
<body>

    <div class="stats-container">
        <div>💰 $<span id="money">0</span></div>
        <div>🏠 HP: <span id="hp">100</span></div>
        <div>👾 Kills: <span id="kills">0</span></div>
    </div>

    <canvas id="gameCanvas" width="700" height="500"></canvas>

    <div class="shop">
        <button onclick="buyAtk()">⚔️ 攻撃力UP<span class="price" id="p-atk">Cost: 50</span></button>
        <button onclick="buyRange()">📏 範囲UP<span class="price" id="p-range">Cost: 80</span></button>
        <button onclick="buyAutoBullet()" id="btn-auto">🚀 追尾弾<span class="price">Cost: 100</span></button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let money = 0;
        let baseHp = 100;
        let killCount = 0;
        let hasAutoBullet = false;
        let autoBulletTimer = 0;
        const keys = {};

        const player = {
            x: 350, y: 250, size: 20, speed: 4.5,
            angle: 0, isAttacking: 0, atkRange: 60, atkPower: 1,
            costs: { atk: 50, range: 80 }
        };

        let enemies = [];
        let bullets = [];

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function update() {
            let dx = 0, dy = 0;
            if (keys['w']) dy -= 1;
            if (keys['s']) dy += 1;
            if (keys['a']) dx -= 1;
            if (keys['d']) dx += 1;
            if (dx !== 0 || dy !== 0) {
                player.angle = Math.atan2(dy, dx);
                player.x += dx * player.speed;
                player.y += dy * player.speed;
            }

            if (keys['k'] && player.isAttacking <= 0) {
                player.isAttacking = 15; // 表示時間を少し延長
                checkAttackHit();
            }
            if (player.isAttacking > 0) player.isAttacking--;

            if (hasAutoBullet) {
                autoBulletTimer++;
                if (autoBulletTimer > 45 && enemies.length > 0) { // 発射間隔も少し短縮
                    bullets.push({ x: 350, y: 250, target: enemies[0], speed: 7 });
                    autoBulletTimer = 0;
                }
            }

            bullets.forEach((b, i) => {
                if (!enemies.includes(b.target)) b.target = enemies[0] || null;
                if (!b.target) { bullets.splice(i, 1); return; }
                const angle = Math.atan2(b.target.y - b.y, b.target.x - b.x);
                b.x += Math.cos(angle) * b.speed;
                b.y += Math.sin(angle) * b.speed;
                if (Math.hypot(b.target.x - b.x, b.target.y - b.y) < 15) {
                    b.target.hp -= 2;
                    bullets.splice(i, 1);
                    if (b.target.hp <= 0) destroyEnemy(b.target);
                }
            });

            if (Math.random() < 0.03) spawnEnemy();

            enemies.forEach((enemy, index) => {
                const angleToBase = Math.atan2(250 - enemy.y, 350 - enemy.x);
                enemy.x += Math.cos(angleToBase) * enemy.speed;
                enemy.y += Math.sin(angleToBase) * enemy.speed;
                if (Math.hypot(350 - enemy.x, 250 - enemy.y) < 25) {
                    baseHp -= enemy.power;
                    enemies.splice(index, 1);
                    document.getElementById('hp').innerText = baseHp;
                }
            });
        }

        function spawnEnemy() {
            const side = Math.floor(Math.random() * 4);
            let ex, ey;
            if(side === 0) { ex = Math.random()*700; ey = -30; }
            else if(side === 1) { ex = 730; ey = Math.random()*500; }
            else if(side === 2) { ex = Math.random()*700; ey = 530; }
            else { ex = -30; ey = Math.random()*500; }

            let isStrong = (killCount >= 100 && Math.random() < 0.33);
            enemies.push({
                x: ex, y: ey,
                hp: isStrong ? 3 : 1,
                speed: isStrong ? 1.8 : 1.2,
                color: isStrong ? "#d00060" : "#ff4d6d", // より濃い色に
                size: isStrong ? 30 : 22, // 敵を大きく
                power: isStrong ? 5 : 1,
                isStrong: isStrong
            });
        }

        function checkAttackHit() {
            enemies.forEach((enemy) => {
                const dist = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                if (dist < player.atkRange + 20) {
                    const angleToEnemy = Math.atan2(enemy.y - player.y, enemy.x - player.x);
                    let diff = Math.abs(player.angle - angleToEnemy);
                    if (diff > Math.PI) diff = 2 * Math.PI - diff;
                    if (diff < 1.2) {
                        enemy.hp -= player.atkPower;
                        if (enemy.hp <= 0) destroyEnemy(enemy);
                    }
                }
            });
        }

        function destroyEnemy(enemy) {
            const idx = enemies.indexOf(enemy);
            if (idx > -1) {
                enemies.splice(idx, 1);
                money += enemy.isStrong ? 50 : 10;
                killCount++;
                document.getElementById('money').innerText = money;
                document.getElementById('kills').innerText = killCount;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 拠点
            ctx.fillStyle = "#a2d2ff";
            ctx.beginPath();
            ctx.roundRect(330, 230, 40, 40, 10);
            ctx.fill();

            // 敵
            enemies.forEach(e => {
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.size/2, 0, Math.PI*2);
                ctx.fill();
                // 目をつけて可愛く
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(e.x-4, e.y-2, 3, 0, Math.PI*2);
                ctx.arc(e.x+4, e.y-2, 3, 0, Math.PI*2);
                ctx.fill();
            });

            // 追尾弾
            bullets.forEach(b => {
                ctx.fillStyle = "#ffd60a";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#ffd60a";
                ctx.beginPath();
                ctx.arc(b.x, b.y, 6, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // プレイヤー
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            
            // 斬撃エフェクト（より派手に）
            if (player.isAttacking > 0) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, player.atkRange + 5, -1.2, 1.2);
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 4;
                ctx.stroke();
            }

            ctx.fillStyle = "#cdb4db";
            ctx.beginPath();
            ctx.roundRect(-10, -10, 20, 20, 5);
            ctx.fill();
            ctx.restore();
        }

        function buyAtk() {
            if (money >= player.costs.atk) {
                money -= player.costs.atk;
                player.atkPower += 1;
                player.costs.atk = Math.floor(player.costs.atk * 1.5);
                updateUI();
            }
        }
        function buyRange() {
            if (money >= player.costs.range) {
                money -= player.costs.range;
                player.atkRange += 15;
                player.costs.range = Math.floor(player.costs.range * 1.6);
                updateUI();
            }
        }
        function buyAutoBullet() {
            if (money >= 100 && !hasAutoBullet) {
                money -= 100;
                hasAutoBullet = true;
                document.getElementById('btn-auto').disabled = true;
                document.getElementById('btn-auto').innerText = "🚀 装備済み";
                updateUI();
            }
        }
        function updateUI() {
            document.getElementById('money').innerText = money;
            document.getElementById('p-atk').innerText = "Cost: " + player.costs.atk;
            document.getElementById('p-range').innerText = "Cost: " + player.costs.range;
        }

        loop();
    </script>
</body>
</html>
