<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Slime Defense - Classic Balance Return</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #fdf0f0; color: #5d4037; font-family: 'M PLUS Rounded 1c', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #ffffff; border: 8px solid #ffccd5; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .stats-container { display: flex; gap: 20px; margin: 10px; font-size: 20px; background: white; padding: 10px 30px; border-radius: 50px; border: 3px solid #ffccd5; }
        .shop-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 5px; }
        .shop-group { background: #ffebee; padding: 12px; border-radius: 20px; margin-top: 5px; border: 2px solid #ffccd5; min-width: 200px; }
        .shop-title { font-size: 14px; margin-bottom: 8px; color: #ff4d6d; text-align: center; border-bottom: 2px solid #ffccd5; }
        .shop-buttons { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
        button { font-family: 'M PLUS Rounded 1c', sans-serif; background: #ff8fa3; color: white; border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 12px; }
        button:hover:not(:disabled) { background: #ff4d6d; transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .price { display: block; font-size: 10px; opacity: 0.9; }
        #respawn-msg { color: #ff4d6d; font-weight: bold; height: 24px; }
        #slam-cool { color: #3498db; font-size: 14px; }
    </style>
</head>
<body>

    <div class="stats-container">
        <div>💰 $<span id="money">0</span></div>
        <div>🏠 拠点: <span id="base-hp">100</span></div>
        <div>❤️ 自分: <span id="player-hp">3</span></div>
        <div>👾 Kill: <span id="kills">0</span></div>
    </div>
    <div id="respawn-msg"></div>
    <div id="slam-cool">Lキー: グランドスラム未解放</div>

    <canvas id="gameCanvas" width="700" height="500"></canvas>

    <div class="shop-row">
        <!-- 剣の強化 -->
        <div class="shop-group">
            <div class="shop-title">⚔️ 剣・スキルの強化</div>
            <div class="shop-buttons">
                <button onclick="buyAtk()">攻撃力UP<span class="price" id="p-atk">Cost: 50</span></button>
                <button onclick="buyRange()">範囲UP<span class="price" id="p-range">Cost: 80</span></button>
                <button onclick="buyGrandSlam()" id="btn-slam">グランドスラム解放<span class="price">Cost: 1500</span></button>
            </div>
        </div>
        <!-- 追尾弾の強化 -->
        <div class="shop-group">
            <div class="shop-title">🚀 追尾弾の強化</div>
            <div class="shop-buttons">
                <button onclick="buyAutoBullet()" id="btn-auto">追尾弾解放<span class="price">Cost: 500</span></button>
                <button onclick="buyBulletSpeed()" id="btn-b-speed" disabled>弾速UP<span class="price">Cost: 1500</span></button>
                <button onclick="buyBulletCount()" id="btn-b-count" disabled>数UP<span class="price">Cost: 2000</span></button>
            </div>
        </div>
        <!-- 拠点の強化 -->
        <div class="shop-group">
            <div class="shop-title">🏠 拠点の強化</div>
            <div class="shop-buttons">
                <button onclick="buyBaseHeal()" id="btn-b-heal">自動回復解放<span class="price">Cost: 2500</span></button>
                <button onclick="upgradeBaseHeal()" id="btn-b-heal-up" disabled>回復速度UP<span class="price" id="p-heal-up">Cost: ---</span></button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let money = 0, baseHp = 100, maxBaseHp = 100, killCount = 0;
        const keys = {};

        // 元のコスト構造を持つプレイヤー
        const player = {
            x: 350, y: 250, size: 24, speed: 4.5,
            hp: 3, maxHp: 3, isAlive: true, respawnTimer: 0,
            angle: 0, isAttacking: 0, atkCombo: 0, lastAtkTime: 0,
            atkRange: 45, atkPower: 1,
            hasSlam: false, isSlamming: 0, slamCharge: 0, lastSlamTime: 0,
            costs: { atk: 50, range: 80 }
        };

        const autoSetting = { enabled: false, timer: 0, interval: 180, speed: 7, count: 1 };
        const baseHealSetting = { enabled: false, level: 5, timer: 0, cost: 3500 };

        let enemies = [], bullets = [];

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function loop() { update(); draw(); requestAnimationFrame(loop); }

        function update() {
            if (baseHealSetting.enabled && baseHp < maxBaseHp) {
                baseHealSetting.timer++;
                if (baseHealSetting.timer >= baseHealSetting.level * 60) {
                    baseHp = Math.min(maxBaseHp, baseHp + 1);
                    document.getElementById('base-hp').innerText = Math.floor(baseHp);
                    baseHealSetting.timer = 0;
                }
            }

            if (!player.isAlive) {
                player.respawnTimer--;
                document.getElementById('respawn-msg').innerText = `復活まで ${Math.ceil(player.respawnTimer / 60)}秒`;
                if (player.respawnTimer <= 0) {
                    player.isAlive = true; player.hp = player.maxHp;
                    player.x = 350; player.y = 250;
                    document.getElementById('respawn-msg').innerText = "";
                    document.getElementById('player-hp').innerText = player.hp;
                }
                updateEnemiesOnly(); return;
            }

            let dx = 0, dy = 0;
            if (keys['w']) dy -= 1; if (keys['s']) dy += 1;
            if (keys['a']) dx -= 1; if (keys['d']) dx += 1;
            if (dx !== 0 || dy !== 0) {
                player.angle = Math.atan2(dy, dx);
                player.x += dx * player.speed; player.y += dy * player.speed;
            }

            const now = Date.now();
            if (keys['k'] && player.isAttacking <= 0 && player.isSlamming <= 0 && now - player.lastAtkTime > 500) {
                player.isAttacking = 15;
                player.atkCombo = (player.atkCombo + 1) % 3;
                player.lastAtkTime = now;
            }
            if (player.isAttacking > 0) {
                checkAttackHit(player.atkCombo === 2 ? 2.0 : 1.0, 10, false);
                player.isAttacking--;
            }

            if (player.hasSlam) {
                const coolLeft = Math.max(0, Math.ceil((5000 - (now - player.lastSlamTime)) / 1000));
                document.getElementById('slam-cool').innerText = coolLeft > 0 ? `スラム冷却中: ${coolLeft}秒` : "Lキー: グランドスラム準備完了！";
            }

            if (keys['l'] && player.hasSlam && player.isSlamming <= 0 && now - player.lastSlamTime > 5000) {
                player.slamCharge = 40; 
                player.isSlamming = 70;
                player.lastSlamTime = now;
            }
            if (player.isSlamming > 0) {
                if (player.slamCharge > 0) player.slamCharge--;
                // ★ グランドスラムの範囲を少し小さく (4.5倍 ➔ 2.8倍)
                if (player.slamCharge === 1) checkAttackHit(2.8, 120, true); 
                player.isSlamming--;
            }

            updateEnemiesOnly();

            enemies.forEach(e => {
                if (Math.hypot(e.x - player.x, e.y - player.y) < 22) {
                    player.hp -= 0.01;
                    document.getElementById('player-hp').innerText = Math.ceil(player.hp);
                    if (player.hp <= 0) { player.isAlive = false; player.respawnTimer = 600; }
                }
            });
        }

        function updateEnemiesOnly() {
            if (autoSetting.enabled && enemies.length > 0) {
                autoSetting.timer++;
                if (autoSetting.timer >= autoSetting.interval) {
                    for(let i=0; i<autoSetting.count; i++) {
                        bullets.push({ x: 350, y: 250, target: enemies[Math.min(i, enemies.length-1)], speed: autoSetting.speed });
                    }
                    autoSetting.timer = 0;
                }
            }
            bullets.forEach((b, i) => {
                if (!enemies.includes(b.target)) b.target = enemies[0] || null;
                if (!b.target) { bullets.splice(i, 1); return; }
                const angle = Math.atan2(b.target.y - b.y, b.target.x - b.x);
                b.x += Math.cos(angle) * b.speed; b.y += Math.sin(angle) * b.speed;
                if (Math.hypot(b.target.x - b.x, b.target.y - b.y) < 15) {
                    b.target.hp -= 2; bullets.splice(i, 1);
                    if (b.target.hp <= 0) destroyEnemy(b.target);
                }
            });

            if (Math.random() < 0.038) spawnEnemy();
            enemies.forEach((enemy) => {
                const angleToBase = Math.atan2(250 - enemy.y, 350 - enemy.x);
                enemy.x += Math.cos(angleToBase) * enemy.speed;
                enemy.y += Math.sin(angleToBase) * enemy.speed;
                if (Math.hypot(350 - enemy.x, 250 - enemy.y) < 20) {
                    baseHp -= enemy.power;
                    const idx = enemies.indexOf(enemy);
                    enemies.splice(idx, 1);
                    document.getElementById('base-hp').innerText = Math.floor(baseHp);
                }
            });
        }

        function spawnEnemy() {
            const side = Math.floor(Math.random() * 4);
            let ex, ey;
            if(side === 0) { ex = Math.random()*700; ey = -40; }
            else if(side === 1) { ex = 740; ey = Math.random()*500; }
            else if(side === 2) { ex = Math.random()*700; ey = 540; }
            else { ex = -40; ey = Math.random()*500; }

            let hp = 1, speed = 0.8, size = 20, color = "#ff4d6d", power = 1, type = "normal", isStrong = false;

            if (killCount >= 1000) {
                if (Math.random() < 0.333) {
                    hp = 8; speed = 0.9; color = "#222222"; power = 10; type = "black"; isStrong = true;
                } else {
                    hp = 3; speed = 1.2; size = 30; color = "#b7094c"; power = 5; type = "strong"; isStrong = true;
                }
            } else if (killCount >= 500) {
                if (Math.random() < 0.333) {
                    hp = 3; speed = 1.2; size = 30; color = "#b7094c"; power = 5; type = "strong"; isStrong = true;
                }
            }

            enemies.push({ x: ex, y: ey, hp: hp, speed: speed, size: size, color: color, power: power, isStrong: isStrong, type: type });
        }

        function checkAttackHit(rangeMult, knockback, isSlam) {
            const range = player.atkRange * rangeMult;
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const dist = Math.hypot(e.x - player.x, e.y - player.y);
                
                if (dist < range + 20) {
                    const angleToEnemy = Math.atan2(e.y - player.y, e.x - player.x);
                    let diff = Math.abs(player.angle - angleToEnemy);
                    if (diff > Math.PI) diff = 2 * Math.PI - diff;
                    
                    const hitAngle = isSlam ? 2.5 : 1.2;
                    if (diff < hitAngle) {
                        e.hp -= isSlam ? player.atkPower * 5 : player.atkPower;
                        e.x += Math.cos(angleToEnemy) * knockback;
                        e.y += Math.sin(angleToEnemy) * knockback;
                        if (e.hp <= 0) destroyEnemy(e);
                    }
                }
            }
        }

        function destroyEnemy(enemy) {
            const idx = enemies.indexOf(enemy);
            if (idx > -1) { 
                enemies.splice(idx, 1); 
                money += (enemy.type === "black") ? 200 : (enemy.type === "strong" ? 100 : 10);
                killCount++; 
                updateUI();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#a2d2ff"; ctx.beginPath(); ctx.roundRect(335, 235, 30, 30, 8); ctx.fill();
            enemies.forEach(e => {
                ctx.fillStyle = e.color; ctx.beginPath(); ctx.arc(e.x, e.y, e.size/2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = e.type === "black" ? "#ff4d6d" : "white"; 
                ctx.beginPath(); ctx.arc(e.x-4,e.y-2,2.5,0,Math.PI*2); ctx.arc(e.x+4,e.y-2,2.5,0,Math.PI*2); ctx.fill();
            });

            if (player.isAlive) {
                ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
                if (player.isAttacking > 0) {
                    const m = player.atkCombo === 2 ? 2.0 : 1.0;
                    ctx.fillStyle = player.atkCombo === 2 ? "rgba(0, 255, 255, 0.6)" : "rgba(0, 240, 255, 0.35)";
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.arc(0, 0, player.atkRange * m, -1.2, 1.2); ctx.fill();
                    ctx.strokeStyle = "#00f0ff"; ctx.lineWidth = player.atkCombo === 2 ? 6 : 4; ctx.stroke();
                }
                // ★ グランドスラムのエフェクト範囲も縮小に合わせて調整
                if (player.isSlamming > 0) {
                    if (player.slamCharge > 0) {
                        ctx.strokeStyle = "rgba(255, 255, 255, 0.8)"; ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.stroke();
                    } else {
                        ctx.fillStyle = "rgba(255, 255, 0, 0.5)"; ctx.beginPath();
                        ctx.moveTo(0,0); ctx.arc(0,0, player.atkRange*2.8, -2.5, 2.5); ctx.fill();
                    }
                }
                ctx.fillStyle = "#cdb4db"; ctx.beginPath(); ctx.roundRect(-9, -9, 18, 18, 4); ctx.fill();
                ctx.restore();
            }
            bullets.forEach(b => { ctx.fillStyle = "#ffd60a"; ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill(); });
        }

        // --- コストを元の設計に復旧 ---
        function buyAtk() { if(money>=player.costs.atk){ money-=player.costs.atk; player.atkPower++; player.costs.atk=Math.floor(player.costs.atk*1.5); updateUI(); } }
        function buyRange() { if(money>=player.costs.range){ money-=player.costs.range; player.atkRange+=10; player.costs.range=Math.floor(player.costs.range*1.6); updateUI(); } }
        
        function buyGrandSlam() { 
            if(money>=1500 && !player.hasSlam){ 
                money-=1500; player.hasSlam=true; 
                document.getElementById('btn-slam').disabled=true; 
                document.getElementById('btn-slam').innerText="⚔️ 解放済み";
                updateUI(); 
            } 
        }
        function buyAutoBullet() { 
            if(money>=500 && !autoSetting.enabled){ 
                money-=500; autoSetting.enabled=true; 
                document.getElementById('btn-auto').disabled=true; 
                document.getElementById('btn-auto').innerText="🚀 解放済み";
                document.getElementById('btn-b-speed').disabled=false; 
                document.getElementById('btn-b-count').disabled=false; 
                updateUI(); 
            } 
        }
        function buyBulletSpeed() { if(money>=1500){ money-=1500; autoSetting.speed+=3; document.getElementById('btn-b-speed').disabled=true; document.getElementById('btn-b-speed').innerText="🚀 最大"; updateUI(); } }
        function buyBulletCount() { if(money>=2000){ money-=2000; autoSetting.count+=1; document.getElementById('btn-b-count').disabled=true; document.getElementById('btn-b-count').innerText="🚀 最大"; updateUI(); } }
        
        function buyBaseHeal() { 
            if(money>=2500 && !baseHealSetting.enabled){ 
                money-=2500; baseHealSetting.enabled=true; 
                document.getElementById('btn-b-heal').disabled=true; 
                document.getElementById('btn-b-heal').innerText="🏠 有効中";
                document.getElementById('btn-b-heal-up').disabled=false; 
                updateUI(); 
            } 
        }
        function upgradeBaseHeal() { 
            if(money>=baseHealSetting.cost && baseHealSetting.enabled){ 
                money-=baseHealSetting.cost; 
                if(baseHealSetting.level===5) {
                    baseHealSetting.level=4; baseHealSetting.cost=5000;
                } else if(baseHealSetting.level===4) {
                    baseHealSetting.level=3; document.getElementById('btn-b-heal-up').disabled=true;
                }
                updateUI(); 
            } 
        }

        function updateUI() { 
            document.getElementById('money').innerText = money; 
            document.getElementById('kills').innerText = killCount; 
            document.getElementById('p-atk').innerText = "Cost: " + player.costs.atk; 
            document.getElementById('p-range').innerText = "Cost: " + player.costs.range; 
            
            if (!baseHealSetting.enabled) {
                document.getElementById('p-heal-up').innerText = "Cost: ---";
            } else if (baseHealSetting.level === 5) {
                document.getElementById('btn-b-heal-up').innerHTML = "4秒に1回にする<span class='price'>Cost: 3500</span>";
            } else if (baseHealSetting.level === 4) {
                document.getElementById('btn-b-heal-up').innerHTML = "3秒に1回にする<span class='price'>Cost: 5000</span>";
            } else if (baseHealSetting.level === 3) {
                document.getElementById('btn-b-heal-up').innerHTML = "✨ 最大強化済み <span class='price'>Cost: MAX</span>";
            }
        }
        
        loop();
    </script>
</body>
</html>
