<h2>まいくらくいず</h2>

<button onclick="check('ハチ')">ハチ</button>
<button onclick="check('クマ')">クマ</button>
<button onclick="check('カニ')">カニ</button>

<button onclick="janken('グー')">グー</button>
<button onclick="janken('チョキ')">チョキ</button>
<button onclick="janken('パー')">パー</button>

<script>
function check(kaitou){
    if (kaitou === "カニ"){
        alert("正解");
    } else {
        alert("不正解");
    }
}
function janken(player){
    const hands = ["グー", "チョキ", "パー"];
    const cpu = hands[Math.floor(Math.random() * 3)];

    if (player === cpu){
        alert("あいこ！ 相手も " + cpu);
    } else if (
        (player === "グー" && cpu === "チョキ") ||
        (player === "チョキ" && cpu === "パー") ||
        (player === "パー" && cpu === "グー")
    ){
        alert("勝ち！ 相手は " + cpu);
    } else {
        alert("負け！ 相手は " + cpu);
    }
}
</script>

<style>
body {
    background: linear-gradient(#6cc04a, #3a7d2c);
    text-align: center;
    font-family: Arial, sans-serif;
    color: white;
}

/* タイトル */
h1 {
    background: #4d2e1a;
    display: inline-block;
    padding: 10px 20px;
    border: 4px solid #2b1a0f;
    box-shadow: 4px 4px 0 #1a0f08;
}

/* ブロックボタン */
#block {
    width: 200px;
    height: 200px;
    background: #8b5a2b;
    margin: 20px auto;
    border: 6px solid #3b2a1a;
    box-shadow: 6px 6px 0 #1a0f08;
    cursor: pointer;
    font-size: 20px;
    line-height: 200px;
    user-select: none;
    transition: 0.1s;
}

#block:active {
    transform: scale(0.95);
}

/* スコア */
#score {
    font-size: 30px;
    margin: 10px;
}

/* ボタン */
button {
    background: #7a5c3a;
    color: white;
    border: 3px solid #3b2a1a;
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    box-shadow: 4px 4px 0 #1a0f08;
}

button:active {
    transform: translate(3px,3px);
    box-shadow: none;
}
</style>

</head>

<body>

<h1>⛏ マイクラクリッカー</h1>

<div id="score">0</div>

<div id="block" onclick="mine()">⛏ ブロック</div>

<button onclick="upgrade()">つるはし強化（+1） 10点</button>

<script>
let score = 0;
let power = 1;

function mine(){
    score += power;
    update();
}

function upgrade(){
    if(score >= 10){
        score -= 10;
        power += 1;
        alert("つるはし強化！パワー +1");
        update();
    } else {
        alert("スコアが足りない！");
    }
}

function update(){
    document.getElementById("score").innerText = "スコア: " + score;
}
</script>


</body>
