<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D Dogfight - Tank Evolution</title>
    <style>
        body { margin: 0; overflow: hidden; background: #40a0ff; font-family: 'Consolas', monospace; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 5px;
            pointer-events: none; border-left: 5px solid #0ff;
        }
        #hp-bar-bg { width: 200px; height: 10px; background: #333; margin: 8px 0; }
        #hp-bar { width: 100%; height: 100%; background: #00ffff; box-shadow: 0 0 10px #0ff; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; color: #0f0;
            transform: translate(-50%, -50%); font-size: 30px; pointer-events: none;
        }
        #game-over-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: red; display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="ui">
        <b>[ AERIAL COMBAT UNIT ]</b><br>
        SCORE: <span id="score">0</span>
        <div id="hp-bar-bg"><div id="hp-bar"></div></div>
        <div style="font-size: 11px; color: #0ff;">SPACE: ASCEND / SHIFT: DESCEND</div>
    </div>

    <div id="crosshair">＋</div>
    <div id="game-over-screen"><h1>ALTITUDE LOST - MISSION FAILED</h1><button onclick="location.reload()">RE-DEPLOY</button></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e); // 少し夕暮れ・宇宙寄りのかっこいい色
        scene.fog = new THREE.Fog(0x1a1a2e, 100, 400);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(100, 200, 100); scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        // 地面と都市
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), floorMat).rotateX(-Math.PI/2));
        
        const buildings = [];
        for(let i=0; i<100; i++) {
            const h = 20 + Math.random()*60;
            const b = new THREE.Mesh(new THREE.BoxGeometry(10, h, 10), new THREE.MeshStandardMaterial({ color: 0x222233 }));
            b.position.set((Math.random()-0.5)*400, h/2, (Math.random()-0.5)*400);
            scene.add(b);
            buildings.push(b);
        }

        // --- 飛行体（ジェット）生成 ---
        function createFlyer(color, isPlayer = false) {
            const g = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color });
            
            // ボディ
            const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 3), mat);
            g.add(body);

            // ウィング
            const wing = new THREE.Mesh(new THREE.BoxGeometry(5, 0.1, 1.5), mat);
            wing.position.z = -0.5;
            g.add(wing);

            // 砲塔
            const turret = new THREE.Mesh(new THREE.BoxGeometry(1, 0.4, 1), mat);
            turret.position.y = 0.4;
            g.add(turret);

            // ジェット噴射（光るパーツ）
            const jetGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2);
            const jetMat = new THREE.MeshBasicMaterial({ color: isPlayer ? 0x00ffff : 0xff0000 });
            const jet = new THREE.Mesh(jetGeo, jetMat);
            jet.position.set(0, -0.2, -1.2);
            jet.rotation.x = Math.PI/2;
            g.add(jet);

            const gunPivot = new THREE.Group();
            gunPivot.position.set(0, 0.4, 0.5);
            const gun = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 2), mat);
            gun.rotation.x = Math.PI/2; gun.position.z = 0.8;
            gunPivot.add(gun); g.add(gunPivot);

            return { group: g, gun: gunPivot, jet: jet };
        }

        const player = createFlyer(0x0055ff, true);
        scene.add(player.group);
        player.group.position.y = 10;

        const enemies = [];
        function spawnEnemy() {
            const e = createFlyer(0xff3300, false);
            e.group.position.set((Math.random()-0.5)*300, 10 + Math.random()*30, (Math.random()-0.5)*300);
            scene.add(e.group);
            enemies.push({ tank: e, lastShot: Date.now(), speed: 0.1 + Math.random()*0.1 });
        }
        for(let i=0; i<6; i++) spawnEnemy();

        // --- ロジック ---
        let playerHP = 100, score = 0, isDead = false;
        let mouseX = 0, mouseY = 0;
        const bullets = [];
        const keys = {};

        window.addEventListener('mousemove', e => {
            mouseX = (e.clientX / window.innerWidth) - 0.5;
            mouseY = (e.clientY / window.innerHeight) - 0.5;
        });
        window.addEventListener('mousedown', () => { if(!isDead) fire(player); });
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function fire(flyer, isEnemy = false) {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshBasicMaterial({ color: isEnemy ? 0xff4400 : 0x00ffff }));
            const tip = new THREE.Vector3(0, 0, 2).applyMatrix4(flyer.gun.matrixWorld);
            b.position.copy(tip);
            const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(flyer.gun.quaternion).applyQuaternion(flyer.group.quaternion);
            b.userData = { velocity: dir.multiplyScalar(isEnemy ? 1.5 : 3.0), isEnemy };
            scene.add(b); bullets.push(b);
        }

        function animate() {
            if(isDead) return;
            requestAnimationFrame(animate);

            // プレイヤー飛行制御
            if (keys['Space']) player.group.position.y += 0.2;
            if (keys['ShiftLeft']) player.group.position.y -= 0.2;
            if (player.group.position.y < 1) player.group.position.y = 1;

            if (keys['KeyW']) player.group.translateZ(0.5);
            if (keys['KeyS']) player.group.translateZ(-0.3);
            if (keys['KeyA']) player.group.rotation.y += 0.05;
            if (keys['KeyD']) player.group.rotation.y -= 0.05;

            // プレイヤー砲身エイム
            player.gun.rotation.x -= (-mouseY * 1.5 + player.gun.rotation.x) * 0.1;
            player.gun.rotation.y += (-mouseX * 1.5 - player.gun.rotation.y) * 0.1;

            // ジェットの明滅（演出）
            player.jet.material.opacity = 0.5 + Math.random() * 0.5;

            // 敵AI（空中追跡）
            enemies.forEach(e => {
                const dist = e.tank.group.position.distanceTo(player.group.position);
                
                // 3D的な方向修正
                e.tank.group.lookAt(player.group.position);
                
                if (dist > 30) {
                    e.tank.group.translateZ(e.speed);
                }

                // 一定距離なら射撃
                if (dist < 100 && Date.now() - e.lastShot > 2000) {
                    fire(e.tank, true);
                    e.lastShot = Date.now();
                }
            });

            // 弾道更新
            for(let i = bullets.length-1; i>=0; i--) {
                const b = bullets[i];
                b.position.add(b.userData.velocity);

                if(b.userData.isEnemy && b.position.distanceTo(player.group.position) < 3) {
                    playerHP -= 5;
                    document.getElementById('hp-bar').style.width = playerHP + "%";
                    if(playerHP <= 0) { isDead = true; document.getElementById('game-over-screen').style.display='flex'; }
                    scene.remove(b); bullets.splice(i, 1);
                } else if(!b.userData.isEnemy) {
                    enemies.forEach((e, ei) => {
                        if(b.position.distanceTo(e.tank.group.position) < 4) {
                            scene.remove(e.tank.group); enemies.splice(ei, 1);
                            score += 100; document.getElementById('score').innerText = score;
                            spawnEnemy(); scene.remove(b); bullets.splice(i, 1);
                        }
                    });
                }
                if(b.position.y < -5 || b.position.length() > 600) { scene.remove(b); bullets.splice(i, 1); }
            }

            // カメラ追従
            const camOffset = new THREE.Vector3(0, 5, -15).applyMatrix4(player.group.matrixWorld);
            camera.position.lerp(camOffset, 0.1);
            camera.lookAt(player.group.position);

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
