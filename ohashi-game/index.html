<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D Tank - High Performance</title>
    <style>
        body { margin: 0; overflow: hidden; background: #40a0ff; font-family: 'Consolas', monospace; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 5px;
            pointer-events: none; border-left: 5px solid #0f0;
        }
        #hp-bar-bg { width: 200px; height: 10px; background: #333; margin: 8px 0; }
        #hp-bar { width: 100%; height: 100%; background: #0f0; transition: width 0.2s; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; color: #0f0;
            transform: translate(-50%, -50%); font-size: 30px; pointer-events: none;
        }
        #scope-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, black 70%);
            display: none; pointer-events: none; border: 2px solid #0f0;
        }
        #game-over-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: red; display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="ui">
        <b>[ TANK COMMANDER ]</b><br>
        SCORE: <span id="score">0</span>
        <div id="hp-bar-bg"><div id="hp-bar"></div></div>
        <div style="font-size: 11px; color: #aaa;">
            Mouse: 砲塔旋回 / Right-Click: スコープ<br>
            WASD: 移動 / Left-Click: 射撃
        </div>
    </div>

    <div id="scope-overlay"></div>
    <div id="crosshair">＋</div>

    <div id="game-over-screen">
        <h1>TANK DESTROYED</h1>
        <button onclick="location.reload()">RE-DEPLOY</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- シーン・カメラ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x40a0ff);
        scene.fog = new THREE.Fog(0x40a0ff, 50, 200);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 100, 50); sun.castShadow = true;
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // 地面とビル街
        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x333333 })).rotateX(-Math.PI/2));
        for(let i=0; i<60; i++) {
            const h = 10 + Math.random()*30;
            const b = new THREE.Mesh(new THREE.BoxGeometry(8, h, 8), new THREE.MeshStandardMaterial({ color: 0x555566 }));
            const rx = (Math.random()-0.5)*200, rz = (Math.random()-0.5)*200;
            if(Math.abs(rx)>15 || Math.abs(rz)>15) { b.position.set(rx, h/2, rz); scene.add(b); }
        }

        // --- 戦車生成 ---
        function createTank(color) {
            const g = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color });
            const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.7, 3.2), mat);
            body.position.y = 0.35; g.add(body);

            const turret = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.6, 1.8), mat);
            const turretGroup = new THREE.Group();
            turret.position.set(0, 1.0, 0); turretGroup.add(turret);

            const gunPivot = new THREE.Group();
            gunPivot.position.set(0, 1.0, 0.8);
            const gun = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 2.5), mat);
            gun.rotation.x = Math.PI/2; gun.position.z = 1.0;
            gunPivot.add(gun); turretGroup.add(gunPivot);
            g.add(turretGroup);

            return { group: g, turret: turretGroup, gun: gunPivot };
        }

        const player = createTank(0x3d4d21);
        scene.add(player.group);

        // 敵管理
        const enemies = [];
        const spawnEnemy = () => {
            const e = createTank(0x772222);
            e.group.position.set((Math.random()-0.5)*150, 0, (Math.random()-0.5)*150);
            scene.add(e.group);
            enemies.push({ tank: e, lastShot: Date.now() });
        }
        for(let i=0; i<4; i++) spawnEnemy();

        // --- 操作・システム変数 ---
        let playerHP = 100, score = 0, isDead = false, isScope = false;
        let mouseX = 0, mouseY = 0;
        const bullets = [];
        const gravity = -0.015;

        window.addEventListener('mousemove', e => {
            mouseX = (e.clientX / window.innerWidth) - 0.5;
            mouseY = (e.clientY / window.innerHeight) - 0.5;
        });
        window.addEventListener('mousedown', e => {
            if(e.button === 0 && !isDead) fire(player); // 左クリック：射撃
            if(e.button === 2) toggleScope(true); // 右クリック：スコープ
        });
        window.addEventListener('mouseup', e => { if(e.button === 2) toggleScope(false); });
        window.addEventListener('contextmenu', e => e.preventDefault());

        function toggleScope(active) {
            isScope = active;
            camera.fov = active ? 25 : 75;
            camera.updateProjectionMatrix();
            document.getElementById('scope-overlay').style.display = active ? 'block' : 'none';
        }

        function fire(tankObj, isEnemy = false) {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshBasicMaterial({ color: isEnemy ? 0xff0000 : 0xffff00 }));
            const tip = new THREE.Vector3(0, 0, 3).applyMatrix4(tankObj.gun.matrixWorld);
            b.position.copy(tip);
            const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(tankObj.gun.quaternion).applyQuaternion(tankObj.turret.quaternion).applyQuaternion(tankObj.group.quaternion);
            b.userData = { velocity: dir.multiplyScalar(isEnemy ? 1.0 : 2.0), isEnemy };
            scene.add(b); bullets.push(b);
        }

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function animate() {
            if(isDead) return;
            requestAnimationFrame(animate);

            // 1. 移動
            if (keys['KeyW']) player.group.translateZ(0.18);
            if (keys['KeyS']) player.group.translateZ(-0.12);
            if (keys['KeyA']) player.group.rotation.y += 0.035;
            if (keys['KeyD']) player.group.rotation.y -= 0.035;

            // 2. 主砲旋回性能（なめらかな追従）
            const targetTurretY = -mouseX * 4;
            player.turret.rotation.y += (targetTurretY - player.turret.rotation.y) * 0.05; // 旋回速度を0.05に制限
            const targetGunX = -mouseY * 1.5;
            player.gun.rotation.x -= (targetGunX + player.gun.rotation.x) * 0.05; // 上下旋回速度

            // 3. 敵AI & 弾の計算
            enemies.forEach(e => {
                const dist = e.tank.group.position.distanceTo(player.group.position);
                e.tank.group.rotation.y += (Math.atan2(player.group.position.x-e.tank.group.position.x, player.group.position.z-e.tank.group.position.z) - e.tank.group.rotation.y) * 0.02;
                if(dist > 30) e.tank.group.translateZ(0.08);
                if(dist < 60 && Date.now() - e.lastShot > 3500) { fire(e.tank, true); e.lastShot = Date.now(); }
            });

            for(let i = bullets.length-1; i>=0; i--) {
                const b = bullets[i];
                b.userData.velocity.y += gravity;
                b.position.add(b.userData.velocity);

                if(b.userData.isEnemy && b.position.distanceTo(player.group.position) < 2) {
                    playerHP -= 20;
                    document.getElementById('hp-bar').style.width = playerHP + "%";
                    if(playerHP <= 0) { isDead = true; document.getElementById('game-over-screen').style.display='flex'; }
                    scene.remove(b); bullets.splice(i, 1);
                } else if(!b.userData.isEnemy) {
                    enemies.forEach((e, ei) => {
                        if(b.position.distanceTo(e.tank.group.position) < 2.5) {
                            scene.remove(e.tank.group); enemies.splice(ei, 1);
                            score += 100; document.getElementById('score').innerText = score;
                            spawnEnemy(); scene.remove(b); bullets.splice(i, 1);
                        }
                    });
                }
                if(b.position.y < -1 || b.position.length() > 300) { scene.remove(b); bullets.splice(i, 1); }
            }

            // 4. カメラ追従（スコープ切替）
            if(isScope) {
                const scopePos = new THREE.Vector3(0, 0.2, 0.5).applyMatrix4(player.gun.matrixWorld);
                camera.position.lerp(scopePos, 0.2);
                const lookAtTarget = new THREE.Vector3(0, 0, 10).applyMatrix4(player.gun.matrixWorld);
                camera.lookAt(lookAtTarget);
            } else {
                const camPos = new THREE.Vector3(0, 5, -12).applyMatrix4(player.group.matrixWorld);
                camera.position.lerp(camPos, 0.1);
                camera.lookAt(player.group.position.clone().add(new THREE.Vector3(0, 1.5, 0)));
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
