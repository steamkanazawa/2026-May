<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minecraft | サーバーステータス</title>
  <meta name="description" content="HikamersCraft Minecraftネットワークの稼働状況を確認できます。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.3/css/bulma.min.css">
  <link rel="stylesheet" href="/style.css">
  <script src="/app.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="container dashboard-container topbar-inner">
        <a class="brand" href="/" aria-label="HikamersCraft サーバーステータス">
          <span class="brand-mark" aria-hidden="true"><span></span></span>
          <span class="brand-copy">
            <strong>Minecraft</strong>
            <small>サーバーステータス</small>
          </span>
        </a>
        <div class="topbar-actions">
          <span class="secure-pill"><span></span> リアルタイム監視</span>
          <button id="refreshButton" class="button refresh-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8.1 8.1 0 0 0-14-5.3L4 8m0 0V3m0 5h5M4 13a8.1 8.1 0 0 0 14 5.3L20 16m0 0v5m0-5h-5"/></svg>
            更新
          </button>
        </div>
      </div>
    </header>

    <main class="container dashboard-container">
      <section class="overview" aria-live="polite">
        <article id="overallCard" class="overall-card unknown">
          <p class="eyebrow">現在の稼働状況</p>
          <div class="overall-status">
            <span id="summaryIcon" class="summary-orb unknown" aria-hidden="true"></span>
            <div>
              <h1 id="summaryTitle">サーバー状況を確認中</h1>
              <p id="summaryText">監視データを取得しています…</p>
            </div>
          </div>
          <div class="overall-footer">
            <span>最終確認</span>
            <strong id="updatedAt">--:--:--</strong>
          </div>
        </article>

        <div class="snapshot-grid">
          <article class="snapshot-card">
            <p>稼働中のサーバー</p>
            <strong id="onlineCount">--</strong>
            <small id="onlineCaption">確認待ち</small>
          </article>
          <article class="snapshot-card">
            <p>オンライン人数</p>
            <strong id="playerCount">--</strong>
            <small>応答可能なサーバーの合計</small>
          </article>
          <article class="snapshot-card">
            <p>監視履歴</p>
            <strong>48</strong>
            <small>直近の確認結果を保存</small>
          </article>
        </div>
      </section>

      <section class="servers-panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">サーバー一覧</p>
            <h2>ゲームサーバー</h2>
          </div>
          <div class="legend" aria-label="ステータス凡例">
            <span><i class="operational"></i> 稼働中</span>
            <span><i class="degraded"></i> 一部異常</span>
            <span><i class="outage"></i> 停止中</span>
            <span><i class="unknown"></i> データなし</span>
          </div>
        </div>

        <div id="serverList" class="server-grid" aria-live="polite">
          <div class="loading-card">サーバー情報を取得しています…</div>
        </div>
        <p class="history-note">稼働履歴は、このステータスページが記録した直近48回分の確認結果です。</p>
      </section>
    </main>
  </div>
</body>
</html>
